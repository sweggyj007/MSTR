// ── ATM regime ────────────────────────────────────────────────────────────────
function getAtmRegime(events){
  const cutoff=Date.now()-28*86400000;
  const recent=(events||[]).filter(e=>e.type==="common"&&new Date(e.date).getTime()>=cutoff);
  if(!recent.length)return{regime:"Dormant",weeksActive:0,total4w:0};
  const weeks=new Set(recent.map(e=>{const d=new Date(e.date),day=d.getDay()||7,m=new Date(d);m.setDate(d.getDate()-day+1);return m.toISOString().slice(0,10);}));
  const total4w=recent.reduce((s,e)=>s+e.proceeds,0),w=weeks.size;
  return{regime:w>=3&&total4w/w>200e6?"Aggressive":w>=2?"Active":"Light",weeksActive:w,total4w};
}

// ── BTC trend ─────────────────────────────────────────────────────────────────
function getBtcTrend(hist){
  if(!hist||hist.length<3)return"insufficient";
  const now=hist[hist.length-1].price;
  const a5=hist.filter(h=>h.ts<Date.now()-5*86400000);
  const a10=hist.filter(h=>h.ts<Date.now()-10*86400000);
  const a20=hist.filter(h=>h.ts<Date.now()-20*86400000);
  const r5 =a5.length ?(now-a5[a5.length-1].price)/a5[a5.length-1].price:null;
  const r10=a10.length?(now-a10[a10.length-1].price)/a10[a10.length-1].price:null;
  const r20=a20.length?(now-a20[a20.length-1].price)/a20[a20.length-1].price:null;
  // Uptrend: at least one positive reading
  if([r5,r20].filter(r=>r!==null).every(r=>r>0.01))return"uptrend";
  // Downtrend: BOTH 5d AND 10d AND 20d (if available) must be negative — requires sustained decline
  // Backtest finding: single-period check produced too many false NEUTRAL overrides
  const downs=[r5,r10,r20].filter(r=>r!==null);
  if(downs.length>=2&&downs.every(r=>r<-0.01))return"downtrend";
  return"range";
}

// ── Ownership factor ──────────────────────────────────────────────────────────
function getOwnershipMetrics({btcHeld,btcHeldLog,circulatingBtc,effectiveBtc,exchangeBtc,btcDailyIssuance}){
  const MAX_SUPPLY=21000000;
  const pctMax=btcHeld/MAX_SUPPLY;
  const pctCirc=btcHeld/circulatingBtc;
  const pctEff=btcHeld/effectiveBtc;
  const pctExch=btcHeld/exchangeBtc;

  // 30D delta from btcHeldLog
  const cutoff30=Date.now()-30*86400000;
  const old30=btcHeldLog&&btcHeldLog.filter(l=>l.ts<cutoff30);
  const delta30=old30&&old30.length>0?btcHeld-old30[old30.length-1].btcHeld:null;
  const monthlyIssuance=btcDailyIssuance*30;
  const accum30xIssuance=delta30!=null&&delta30>0?delta30/monthlyIssuance:null;

  // Latest purchase (diff between last two log entries)
  const log=btcHeldLog&&[...btcHeldLog].sort((a,b)=>a.ts-b.ts);
  let latestPurchase=null;
  if(log&&log.length>=2){
    const diff=btcHeld-(log[log.length-1].btcHeld);
    if(diff>0)latestPurchase=diff;
    else{
      const diff2=log[log.length-1].btcHeld-log[log.length-2].btcHeld;
      if(diff2>0)latestPurchase=diff2;
    }
  }
  const latestPurchaseXDaily=latestPurchase?latestPurchase/btcDailyIssuance:null;

  // Trend
  const trend=delta30==null?"unknown":delta30>1000?"rising":delta30<-1000?"falling":"stalled";

  // Absorption level from 30D
  const absorptionLevel=accum30xIssuance==null?"unknown":accum30xIssuance>20?"extreme":accum30xIssuance>5?"high":accum30xIssuance>1?"moderate":"low";

  return{pctMax,pctCirc,pctEff,pctExch,delta30,accum30xIssuance,latestPurchase,latestPurchaseXDaily,trend,absorptionLevel,monthlyIssuance};
}

function getOwnershipContext({ownershipMetrics,accrRatio,regime,mNav}){
  const{trend,accum30xIssuance,absorptionLevel}=ownershipMetrics;
  const isAccretive=accrRatio!=null&&accrRatio>=1.05;
  const isAggressive=["Aggressive","Active"].includes(regime);
  const isOvervalued=mNav!=null&&mNav>1.10;

  let signal="neutral",label="→ Neutral",color="#686662",bg="#F3F2EE";
  if(trend==="rising"&&isAccretive&&!isOvervalued){
    signal="bullish";label="↑ Bullish — all four factors aligned";color="#085041";bg="#E1F5EE";
  } else if(trend==="rising"&&(!isAccretive||isAggressive)){
    signal="btc_over_mstr";label="⇄ Prefer BTC over MSTR";color="#633806";bg="#FAEEDA";
  } else if(trend==="falling"){
    signal="risk_off";label="↓ Risk-off — holdings declining";color="#791F1F";bg="#FCEBEB";
  } else if(trend==="stalled"&&!isOvervalued){
    signal="neutral";label="→ Ownership stalled";color="#686662";bg="#F3F2EE";
  }
  return{signal,label,color,bg,absorptionLevel};
}

// ── STRC analytics ───────────────────────────────────────────────────────────
function getStrcMetrics({strcPrice, preferredOutstanding, preferredDividendRate,
                          softwareRevenueAnnual, atmEvents, mstrPrice, effMstr}){
  const PAR=100;
  // 1. Discount/premium to par
  const discount = strcPrice!=null ? (strcPrice-PAR)/PAR : null;
  const parStatus = strcPrice==null ? "unknown"
    : strcPrice<95 ? "critical" : strcPrice<97 ? "warning" : strcPrice<99 ? "watch" : "stable";

  // 2. Dividend coverage ratio
  //    Annual dividend cost / (software revenue + trailing 90d ATM proceeds annualised)
  const annualDividend = preferredOutstanding>0&&preferredDividendRate>0
    ? preferredOutstanding*preferredDividendRate : 0;
  const cutoff90 = Date.now()-90*86400000;
  const atm90 = (atmEvents||[]).filter(e=>new Date(e.date).getTime()>cutoff90)
    .reduce((s,e)=>s+e.proceeds,0);
  const annualisedAtm = atm90*(365/90);
  const totalFunding = (softwareRevenueAnnual||0)+annualisedAtm;
  const coverageRatio = annualDividend>0&&totalFunding>0 ? totalFunding/annualDividend : null;
  const coverageStatus = coverageRatio==null ? "unknown"
    : coverageRatio<1 ? "critical" : coverageRatio<2 ? "warning"
    : coverageRatio<5 ? "adequate" : "strong";

  // 3. STRC/MSTR relative signal
  //    STRC holding par while MSTR drops = capital fleeing to preferred = early warning
  //    We approximate by comparing STRC discount trend to mNAV direction
  //    Flag when STRC < 99 (showing stress) while mNAV > 1.05 (MSTR still premium)
  const flywheelStress = strcPrice!=null&&effMstr!=null
    && strcPrice<99&&discount<-0.01;

  return{discount,parStatus,annualDividend,coverageRatio,coverageStatus,
         flywheelStress,annualisedAtm,totalFunding};
}

// ── BTC/share trend ──────────────────────────────────────────────────────────
function getBtcPerShareTrend(btcHeldLog, dilutedShares){
  if(!btcHeldLog||btcHeldLog.length<2||!dilutedShares)return{trend:"unknown",points:[],delta30:null,pct30:null};
  const sorted=[...btcHeldLog].sort((a,b)=>a.ts-b.ts);
  const points=sorted.map(l=>({ts:l.ts,bps:l.btcHeld/dilutedShares}));
  const now=points[points.length-1].bps;
  const old30=points.filter(p=>p.ts<Date.now()-30*86400000);
  if(!old30.length)return{trend:"unknown",points,delta30:null,pct30:null};
  const base=old30[old30.length-1].bps;
  const delta30=now-base;
  const pct30=(now-base)/base;
  const trend=pct30>0.005?"rising":pct30<-0.005?"falling":"flat";
  return{trend,points,delta30,pct30};
}

// ── Market absorption ratio ───────────────────────────────────────────────────
function getAbsorptionRatio(atmEvents, mstrVol){
  // Latest common ATM event shares vs 20-day avg volume
  if(!mstrVol||mstrVol<=0)return{ratio:null,label:"unknown",color:"#666",bg:"#F3F2EE"};
  const recent30=[...atmEvents].filter(e=>e.type==="common"&&new Date(e.date).getTime()>Date.now()-30*86400000);
  if(!recent30.length)return{ratio:null,label:"no recent ATM",color:"#666",bg:"#F3F2EE"};
  // Total shares sold in last 30 days ÷ 20 trading days avg volume
  const totalShares=recent30.reduce((s,e)=>s+e.shares,0);
  const tradingDays=22; // ~22 trading days / month
  const dailyAtm=totalShares/tradingDays;
  const ratio=dailyAtm/mstrVol;
  let label,color,bg;
  if(ratio<0.03){label="low — market can absorb";color="#085041";bg="#E1F5EE";}
  else if(ratio<0.08){label="moderate — watch carefully";color="#633806";bg="#FAEEDA";}
  else if(ratio<0.15){label="high — supply pressure";color="#4A1B0C";bg="#FAECE7";}
  else{label="critical — ATM likely depressing price";color="#791F1F";bg="#FCEBEB";}
  return{ratio,dailyAtm,label,color,bg};
}

// ── mNAV velocity + sparkline ────────────────────────────────────────────────
function getMNavVelocity(mNavHistory){
  if(!mNavHistory||mNavHistory.length<2)return{velocity:null,direction:"unknown",sparkPoints:[]};
  const sorted=[...mNavHistory].sort((a,b)=>a.ts-b.ts).slice(-14); // last 14 entries
  const sparkPoints=sorted.map(p=>p.v);
  const now=sorted[sorted.length-1].v;
  const week=sorted.filter(p=>p.ts<Date.now()-7*86400000);
  if(!week.length)return{velocity:null,direction:"unknown",sparkPoints};
  const base=week[week.length-1].v;
  const velocity=now-base;
  const direction=velocity>0.02?"rising":velocity<-0.02?"falling":"stable";
  return{velocity,direction,sparkPoints};
}

  if(prevKey===newKey)return;
  try{
    const log=JSON.parse(localStorage.getItem("mstr__signal-log")||"[]");
    log.push({ts:Date.now(),from:prevKey,to:newKey,mNav:context.mNav,regime:context.regime,trend:context.trend});
    localStorage.setItem("mstr__signal-log", JSON.stringify(log.slice(-100)));

}

  HOLD:  {label:"HOLD / MONITOR",          key:"HOLD",  color:"#854F0B",bg:"#FAEEDA",border:"#EF9F27"},
  REDHI: {label:"REDUCE — HIGH CONVICTION",key:"REDHI", color:"#7A1F05",bg:"#FAE0DA",border:"#C93B15"},
  REDUCE:{label:"REDUCE / HEDGE",          key:"REDUCE",color:"#993C1D",bg:"#FAECE7",border:"#D85A30"},
  SHORT: {label:"SHORT MSTR / LONG BTC",  key:"SHORT", color:"#791F1F",bg:"#FCEBEB",border:"#E24B4A"},
  NEUT:  {label:"NEUTRAL / AVOID",      key:"NEUT",  color:"#444441",bg:"#F1EFE8",border:"#B4B2A9"},
  CAUT:  {label:"CAUTION",              key:"CAUT",  color:"#3C3489",bg:"#EEEDFE",border:"#7F77DD"},

function getSignal({mNav,regime,trend,blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics}){
  // Factor 3: BTC regime
  if(trend==="downtrend")return{...SIG.NEUT,reason:"BTC in downtrend — avoid MSTR regardless of mNAV or ATM regime",blackout,ownershipCtx};
  // Pending
  if(regime==="Pending")return{...SIG.CAUT,reason:"ATM proceeds not yet deployed — reported metrics understated. Do not trade.",blackout,ownershipCtx};

  // Factor 1+2: Valuation + issuance → base signal
  let base;
  if(mNav<1.00&&["Dormant","Light"].includes(regime))     base={...SIG.LONG,  reason:`${((1-mNav)*100).toFixed(1)}% discount to NAV · ATM ${regime.toLowerCase()} · favorable entry`};
  else if(mNav<1.00&&regime==="Active")                   base={...SIG.HOLD,  reason:"Discount to NAV but ATM supply active — upside capped. Wait for Dormant."};
  else if(mNav<1.10)                                      base={...SIG.HOLD,  reason:["Active","Aggressive"].includes(regime)?"At fair value with active ATM — premium ceiling forming. Do not chase.":"Near fair value, ATM manageable — hold if BTC trend constructive."};
  else if(mNav<1.20){
    // Split reduce by conviction: Active/Aggressive = higher conviction reduce
    if(["Active","Aggressive"].includes(regime)){
      base={...SIG.REDHI,reason:`mNAV ${mNav.toFixed(2)}× + ${regime} ATM — premium + active supply pressure. High conviction reduce.`};
    } else {
      base={...SIG.REDUCE,reason:`mNAV ${mNav.toFixed(2)}× · ATM ${regime.toLowerCase()} · company likely selling into this premium.`};
    }
  }
  // Extreme mNAV override: >2.0× is indefensible at any regime — always SHORT
  // Backtest finding: V2 Dormant/Light cap over-corrected; at 7-8× NAV, no regime justifies holding
  else if(mNav>=2.0)  base={...SIG.SHORT,reason:`mNAV ${mNav.toFixed(2)}× — extreme premium, indefensible at any ATM regime. Systematic SHORT regardless of issuance state.`};
  // Dormant/Light + mNAV 1.20–2.0: cap at REDUCE (premium can still expand with no supply pressure)
  else if(["Dormant","Light"].includes(regime))  base={...SIG.REDUCE,reason:`mNAV ${mNav.toFixed(2)}× + ${regime} regime — ATM supply low, premium may expand further. Reduce exposure, do not short.`};
  // Active + mNAV 1.20–1.40: reduce but not short yet
  else if(mNav<1.40&&regime==="Active")  base={...SIG.REDUCE,reason:`mNAV ${mNav.toFixed(2)}× + Active ATM — elevated but not extreme. Reduce exposure, watch for Aggressive shift.`};
  // SHORT: Aggressive regime OR mNAV > 1.40 (any regime except Dormant/Light already handled above)
  else  base={...SIG.SHORT,reason:`mNAV ${mNav.toFixed(2)}× + ${regime} ATM — systematic seller above fair value. Equal-dollar pair. (beta is regime-dependent)`};

  // Factor 4: Ownership modifier
  if(ownershipCtx){
    if(ownershipCtx.signal==="btc_over_mstr"&&["LONG","HOLD"].includes(base.key)){
      // Ownership rising but dilutive — downgrade to BTC over MSTR
      return{...SIG.BTCOV,cls:"sig-btcov",reason:"Ownership expanding but BTC/share accretion weak — equity supply pressure dominates. Hold BTC; reduce MSTR exposure.",blackout,ownershipCtx};
    }
    if(ownershipCtx.signal==="bullish"&&base.key==="LONG"){
      // All four factors aligned — reinforce
      base={...base,reason:base.reason+" · Ownership factor confirms: rising BTC% + accretive ATM."};
    }
    if(ownershipCtx.signal==="risk_off"){
      return{...SIG.REDUCE,reason:"MSTR BTC holdings declining — forced-sale or capital deployment halt risk. Reduce exposure.",blackout,ownershipCtx};
    }
  }

  // BTC uptrend modifier on REDUCE: strong rally can push MSTR higher even with elevated mNAV
  // Backtest finding: 3 of 12 REDUCE failures were BTC-momentum driven rallies
  // Logic: if BTC is in confirmed uptrend, downgrade REDUCE/REDHI to HOLD — wait for momentum to fade
  if(trend==="uptrend"&&["REDUCE","REDHI"].includes(base.key)&&mNav<1.60){
    return{...SIG.HOLD,reason:`mNAV ${mNav.toFixed(2)}× warrants reducing, but BTC in confirmed uptrend — premium may expand further. Hold; reduce when BTC momentum fades or regime turns Aggressive.`,blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
  }

  // Absorption modifier
  if(absorptionCtx&&absorptionCtx.ratio!=null&&absorptionCtx.ratio>=0.15&&["LONG","HOLD"].includes(base.key)){
    return{...SIG.HOLD,reason:"ATM supply critical — daily issuance is "+Math.round(absorptionCtx.ratio*100)+"% of avg volume. Market absorbing under pressure. Do not chase.",blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
  }
  // BTC/share trend modifier
  if(btcPerShareTrend&&btcPerShareTrend.trend==="falling"&&base.key==="LONG"){
    return{...SIG.HOLD,reason:"BTC/share declining despite purchases — dilution outpacing accumulation. Wait for BTC/share trend to reverse.",blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
  }
  // STRC modifier — preferred stock flywheel stress signals
  if(strcMetrics){
    // STRC critical (<95): downgrade LONG → HOLD, flag HOLD/REDUCE
    if(strcMetrics.parStatus==="critical"&&base.key==="LONG"){
      return{...SIG.HOLD,reason:`STRC trading at $${strcMetrics.discount!=null?(100+strcMetrics.discount*100).toFixed(2):"??"} — critical discount to $100 par. Preferred flywheel impaired. Do not initiate new MSTR long.`,blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
    }
    // Coverage ratio critical (<1): dividend cost exceeds all funding sources
    if(strcMetrics.coverageStatus==="critical"&&["LONG","HOLD"].includes(base.key)){
      return{...SIG.HOLD,reason:`Dividend coverage critical — annual preferred cost ${(strcMetrics.annualDividend/1e9).toFixed(1)}B exceeds estimated funding sources. Flywheel sustainability at risk.`,blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
    }
    // Flywheel stress: STRC discount forming while mNAV still elevated
    if(strcMetrics.flywheelStress&&base.key==="LONG"){
      return{...SIG.HOLD,reason:"STRC showing discount to par while MSTR trades at premium — capital rotating from common to preferred. Monitor for flywheel deceleration.",blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
    }
  }
  return{...base,blackout,ownershipCtx,absorptionCtx,btcPerShareTrend,strcMetrics};
}

// ── 8-K parsing ───────────────────────────────────────────────────────────────
// Parse 8-K filing — extracts ALL security types (STRC/STRF/STRK/STRD/MSTR) + BTC holdings
function parseEightK(text){
  const c=text.replace(/<[^>]+>/g," ").replace(/&[a-z]+;/g," ").replace(/\s+/g," ");

  // BTC holdings (total as-of)
  const btcHeldM=c.match(/(?:held|holds?|total of|aggregate of)\s+(?:approximately\s+)?([\d,]+)\s+bitcoin/i);
  const btcHeld=btcHeldM?parseInt(btcHeldM[1].replace(/,/g,"")) : null;

  // BTC purchased in period
  const btcBoughtM=c.match(/(?:acquired|purchased?)\s+(?:an aggregate of\s+)?(?:approximately\s+)?([\d,]+)\s+bitcoin/i);
  const btcPurchased=btcBoughtM?parseInt(btcBoughtM[1].replace(/,/g,"")) : null;

  // Parse each security's ATM activity
  const securities=[];
  const secPatterns=[
    {key:"STRC", type:"preferred", label:"STRC"},
    {key:"STRF", type:"preferred", label:"STRF"},
    {key:"STRK", type:"preferred", label:"STRK"},
    {key:"STRD", type:"preferred", label:"STRD"},
    {key:"MSTR", type:"common",    label:"MSTR"},
  ];

  for(const sec of secPatterns){
    // Match shares sold for this security
    // Pattern: "STRC Stock ... 19,519,801 ... $1,952.0 ... $1,949.0"
    const shareRe=new RegExp(sec.key+"\\s+Stock[\\s\\S]{0,200}?([\\d,]{4,})\\s+\\$?([\\d,]+\\.?\\d*)\\s+\\$?([\\d,]+\\.?\\d*)","i");
    const m=c.match(shareRe);
    if(m){
      const shares=parseInt(m[1].replace(/,/g,""));
      const notional=parseFloat(m[2].replace(/,/g,""))*1e6;
      const netProc=parseFloat(m[3].replace(/,/g,""))*1e6;
      if(shares>100&&netProc>0){
        securities.push({type:sec.type,label:sec.label,shares,proceeds:netProc,avgPrice:netProc/shares});
      }
    }
  }

  // Fallback: if regex above fails, use simple extraction for MSTR common
  if(!securities.length){
    const sM=c.match(/sold\s+(?:an aggregate of\s+)?(?:approximately\s+)?([\d,]+)\s+shares/i);
    const pM=c.match(/aggregate\s+(?:net\s+)?proceeds\s+of\s+(?:approximately\s+)?\$\s*([\d,.]+)\s*(billion|million)/i);
    if(sM&&pM){
      const shares=parseInt(sM[1].replace(/,/g,""));
      const n=parseFloat(pM[1].replace(/,/g,""));
      const proceeds=pM[2].toLowerCase()==="billion"?n*1e9:n*1e6;
      securities.push({type:"common",label:"MSTR",shares,proceeds,avgPrice:proceeds/shares});
    }
  }

  // Extra: narrative format (e.g. "Issued an additional $2.0 billion notional of STRC and $84 million of Class A common stock")
  if(!securities.length){
    // STRC narrative: "$X billion/million notional of... STRC"
    const strcNarr=c.match(/\$([\d.]+)\s*(billion|million)\s*notional\s*of[\s\S]{0,80}?STRC/i);
    if(strcNarr){
      const n=parseFloat(strcNarr[1]);
      const proceeds=strcNarr[2].toLowerCase()==="billion"?n*1e9:n*1e6;
      const approxShares=Math.round(proceeds/99.85);
      securities.push({type:"preferred",label:"STRC",shares:approxShares,proceeds,avgPrice:99.85});
    }
    // MSTR common narrative: "$X million of Class A common stock"
    const mstrNarr=c.match(/\$([\d.]+)\s*(billion|million)\s*of\s+(?:its\s+)?Class\s+A\s+common/i);
    if(mstrNarr){
      const n=parseFloat(mstrNarr[1]);
      const proceeds=mstrNarr[2].toLowerCase()==="billion"?n*1e9:n*1e6;
      // Estimate shares from a reference MSTR price (narrative doesn't give share count)
      const refPrice=180; // approximate — user can correct in the ATM log
      securities.push({type:"common",label:"MSTR",shares:Math.round(proceeds/refPrice),proceeds,avgPrice:refPrice,estimated:true});
    }
  }

  return{btcHeld,btcPurchased,securities};
}

// Fetch all 8-Ks since a given date, return structured events
async function fetchNewFilings(sinceDate){
  const P1=u=>"https://corsproxy.io/?"+encodeURIComponent(u);
  const P2=u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u);
  const fetchAny=async(url,json=false)=>{
    for(const fn of[()=>fetch(url),()=>fetch(P1(url)),()=>fetch(P2(url))]){
      try{const r=await fn();if(r.ok)return json?await r.json():await r.text();}catch{}
    }
    throw new Error("all proxies failed: "+url);
  };

  // Step 1: get submissions index
  const idx=await fetchAny(`https://data.sec.gov/submissions/CIK${MSTR_CIK.padStart(10,"0")}.json`,true);
  const f=idx.filings.recent;

  // Step 2: find all 8-Ks newer than sinceDate
  const since=new Date(sinceDate).getTime();
  const newFilings=[];
  for(let i=0;i<f.form.length;i++){
    if(f.form[i]==="8-K"&&new Date(f.filingDate[i]).getTime()>since){
      newFilings.push({filed:f.filingDate[i],acc:f.accessionNumber[i].replace(/-/g,""),doc:f.primaryDocument[i]});
    }
  }
  if(!newFilings.length)return{events:[],btcUpdates:[],count:0};

  // Step 3: fetch and parse each filing
  const events=[], btcUpdates=[];
  for(const filing of newFilings){
    try{
      const url=`https://www.sec.gov/Archives/edgar/data/${MSTR_CIK}/${filing.acc}/${filing.doc}`;
      const html=await fetchAny(url,false);
      const parsed=parseEightK(html);

      // Extract ATM events
      for(const sec of (parsed.securities||[])){
        if(sec.shares>1000&&sec.proceeds>100000){
          events.push({
            id:Date.now()+Math.random(),
            date:filing.filed,
            type:sec.type,
            shares:sec.shares,
            proceeds:sec.proceeds,
            avgPrice:sec.avgPrice,
            source:`8-K ${filing.filed}`,
          });
        }
      }

      // Extract BTC holdings update
      if(parsed.btcHeld&&parsed.btcHeld>500000){
        btcUpdates.push({date:filing.filed,btcHeld:parsed.btcHeld,btcPurchased:parsed.btcPurchased});
      }
    }catch(e){
      console.warn(`Failed to parse 8-K ${filing.filed}:`,e.message);
    }
  }

  return{events,btcUpdates,count:newFilings.length};
}
async function geminiParse(text,key){
  const prompt=`Extract from SEC 8-K. Return ONLY JSON:\n{"btcHeld":<number|null>,"btcPurchased":<number|null>,"sharesSold":<number|null>,"proceedsUsd":<dollars|null>}\n\n${text.slice(0,18000)}`;
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,maxOutputTokens:200}})});
  if(!res.ok)throw new Error("Gemini "+res.status);
  const d=await res.json();
  const raw=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("no JSON");
  const p=JSON.parse(m[0]);
  if(p.sharesSold&&p.proceedsUsd&&!p.avgPrice)p.avgPrice=p.proceedsUsd/p.sharesSold;
  return p;
}
async function fetchLatest8K(){
  const P1=u=>"https://corsproxy.io/?"+encodeURIComponent(u);
  const P2=u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u);
  const P3=u=>"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(u);
  const fetchAny=async(url,json=false)=>{
    for(const fn of[()=>fetch(url),()=>fetch(P1(url)),()=>fetch(P2(url)),()=>fetch(P3(url))]){
      try{const r=await fn();if(r.ok)return json?await r.json():await r.text();}catch{}
    }
    throw new Error("all proxies failed: "+url);
  };

  // Step 1: get filing index from submissions API (works via proxy)
  const idxUrl=`https://data.sec.gov/submissions/CIK${MSTR_CIK.padStart(10,"0")}.json`;
  const data=await fetchAny(idxUrl,true);
  const f=data.filings.recent,i=f.form.findIndex(x=>x==="8-K");
  if(i<0)throw new Error("no 8-K found");
  const accRaw=f.accessionNumber[i],acc=accRaw.replace(/-/g,""),filed=f.filingDate[i];
  const docUrl=`https://www.sec.gov/Archives/edgar/data/${MSTR_CIK}/${acc}/${f.primaryDocument[i]}`;

  // Step 2a: try EDGAR full-text search API (returns JSON snippets, no file download needed)
  // This is the most CORS-friendly path
  try{
    const searchUrl=`https://efts.sec.gov/LATEST/search-index?q=%22bitcoin%22&forms=8-K&dateRange=custom&startdt=${filed}&enddt=${filed}&entity=MicroStrategy+Incorporated`;
    const sd=await fetchAny(searchUrl,true);
    const hits=sd?.hits?.hits||[];
    if(hits.length>0){
      // Concatenate all highlighted snippets into a pseudo-document
      const snippets=hits.flatMap(h=>Object.values(h?.highlight||{})).flat().join(" ");
      if(snippets.length>200)return{html:snippets,filed,url:docUrl,source:"efts"};
    }
  }catch{}

  // Step 2b: try fetching the filing viewer JSON (structured, easier than raw HTML)
  try{
    const viewerUrl=`https://www.sec.gov/Archives/edgar/data/${MSTR_CIK}/${acc}/${accRaw}-index.json`;
    const vd=await fetchAny(viewerUrl,true);
    // Get list of documents, prefer .htm exhibit
    const docs=vd?.documents||[];
    const exhibit=docs.find(d=>d.type==="EX-99.1")||docs.find(d=>d.type==="8-K")||docs[0];
    if(exhibit){
      const exUrl=`https://www.sec.gov/Archives/edgar/data/${MSTR_CIK}/${acc}/${exhibit.filename}`;
      const html=await fetchAny(exUrl,false);
      return{html,filed,url:docUrl};
    }
  }catch{}

  // Step 2c: direct document fetch (works on localhost, may fail on file://)
  try{
    const html=await fetchAny(docUrl,false);
    return{html,filed,url:docUrl};
  }catch{}

  throw new Error("could not fetch 8-K document. Try opening via localhost (python -m http.server 8080)");
}

      if(!hasDeepHistory){
        const combined=[...SEED_BTC_LOG,...(s.btcHeldLog||[])];
        const seen=new Set();
        merged.btcHeldLog=combined
          .sort((a,b)=>a.ts-b.ts)
          .filter(l=>{const bucket=Math.floor(l.ts/3600000);if(seen.has(bucket))return false;seen.add(bucket);return true;});
      }

      // Fix atmEvents: if stored events are missing STRC preferred events, merge with seed
      // Detection: seed has preferred type; old data only has common
      const storedEvents=s.atmEvents||[];

      if(res.events&&res.events.length>0){

            Math.abs(new Date(x.date).getTime()-eTime)<30*86400000

              {l:"Ownership",v:ownershipCtx.signal==="bullish"?"✓ rising + accretive":ownershipCtx.signal==="btc_over_mstr"?"⇄ dilutive":ownershipCtx.signal==="risk_off"?"✗ declining":"~ neutral",ok:ownershipCtx.signal==="bullish"},
              {l:"Absorption",v:absorptionCtx.ratio==null?"~ no data":absorptionCtx.ratio<0.03?"✓ low":absorptionCtx.ratio<0.08?"~ moderate":absorptionCtx.ratio<0.15?"⚠ high":"✗ critical",ok:absorptionCtx.ratio==null||absorptionCtx.ratio<0.08},
              {l:"BTC/Share",v:btcPerShareTrend.trend==="rising"?"✓ rising":btcPerShareTrend.trend==="falling"?"✗ falling":btcPerShareTrend.trend==="flat"?"~ flat":"~ no history",ok:btcPerShareTrend.trend==="rising"},
              {l:"STRC Flywheel",v:strcMetrics.parStatus==="stable"?"✓ stable":strcMetrics.parStatus==="watch"?"~ watch":strcMetrics.parStatus==="warning"?"⚠ warning":strcMetrics.parStatus==="critical"?"✗ critical":"~ no data",ok:strcMetrics.parStatus==="stable"||strcMetrics.parStatus==="unknown"},
            ].map(({l,v,ok})=>(
              <div key={l} style={{background:"rgba(0,0,0,0.06)",borderRadius:4,padding:"3px 8px",fontSize:12,fontFamily:mono,color:sig.color,opacity:ok?1:0.65}}>
                <span style={{opacity:.6}}>{l}: </span>{v}
              </div>
            ))}
          </div>
          {(btcHeldStaleDays!=null&&btcHeldStaleDays>10)||(dilSharesStaleDays!=null&&dilSharesStaleDays>10)?
            <div style={{background:"#2E1A00",border:"1px solid #F5A623",borderRadius:6,padding:"5px 10px",fontSize:12,color:"#F5C842",marginBottom:8,fontFamily:mono}}>
              ⚠ Manual data may be stale — {[btcHeldStaleDays>10?`BTC held: ${btcHeldStaleDays}d`:"",dilSharesStaleDays>10?`shares: ${dilSharesStaleDays}d`:""].filter(Boolean).join(" · ")} · check SEC EDGAR
            </div>:null}
          {sig.blackout&&<div style={{background:"#FFF8E6",border:"1px solid #F0C040",borderRadius:6,padding:"6px 10px",fontSize:10,color:"#7A5500",marginBottom:6,fontFamily:mono,lineHeight:1.6}}>⚠ Earnings blackout — ATM likely paused. Dormant regime reading may not reflect true intent.</div>}
          {undeployedProceeds>0&&<div style={{background:"#EEEDFE",border:"1px solid #AFA9EC",borderRadius:6,padding:"6px 10px",fontSize:10,color:"#3C3489",fontFamily:mono,lineHeight:1.6}}>⚠ {fB(undeployedProceeds)} undeployed — reported metrics understated. See pro-forma below.</div>}
        </div>
      ):(
        <div style={{...CARD,textAlign:"center",padding:28,marginBottom:10}}>
          <div style={{color:"var(--t2)",fontSize:12,fontFamily:mono}}>{mstrStatus==="searching"?"⧗ fetching MSTR via web search…":"signal requires MSTR + BTC prices"}</div>
          <div style={{color:"var(--t2)",fontSize:11,fontFamily:mono,marginTop:4}}>enter override in ⚙ for immediate signal</div>
        </div>
      )}

      {/* ── Three pillars ───────────────────────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <div style={CARD}>
          <div style={LBL}>diluted mNAV</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <div style={{...VAL,color:dilMNav!=null?(dilMNav<1?"#0F6E56":dilMNav>1.15?"#791F1F":"var(--t0)"):"var(--t0)"}}>{dilMNav!=null?`${f2(dilMNav)}×`:"—"}</div>
            {mNavDir!=="unknown"&&<span style={{fontSize:12,fontFamily:mono,color:mNavDir==="rising"?"#1D9E75":mNavDir==="falling"?"#E24B4A":"var(--t2)",fontWeight:600}}>
              {mNavDir==="rising"?"↑":mNavDir==="falling"?"↓":"→"}{mNavVel!=null?` ${mNavVel>=0?"+":""}${mNavVel.toFixed(3)}`:""}
            </span>}
          </div>
          <div style={SUB}>{dilMNav!=null&&(dilMNav<1?`${fPct(1-dilMNav)} discount`:`${fPct(dilMNav-1)} premium`)} <span style={{opacity:.6,fontSize:11}}>· {sigDurationDays}d signal</span></div>
          {sparkPoints.length>1&&(()=>{
            const W=160,H=36,pad=3;
            const min=Math.min(...sparkPoints),max=Math.max(...sparkPoints),rng=max-min||0.001;
            const pts=sparkPoints.map((v,i)=>[
              pad+(i/(sparkPoints.length-1))*(W-pad*2),
              pad+(1-((v-min)/rng))*(H-pad*2)
            ]);
            const linePts=pts.map(([x,y])=>`${x},${y}`).join(" ");
            const areaPts=`${pts[0][0]},${H} `+pts.map(([x,y])=>`${x},${y}`).join(" ")+` ${pts[pts.length-1][0]},${H}`;
            const col=mNavDir==="rising"?"#1D9E75":mNavDir==="falling"?"#E24B4A":"#999";
            const colFade=mNavDir==="rising"?"#1D9E7520":mNavDir==="falling"?"#E24B4A20":"#99999920";
            const uid=`sp${Math.random().toString(36).slice(2,7)}`;
            const last=pts[pts.length-1];
            return(
              <svg width={W} height={H} style={{display:"block",marginTop:6,overflow:"visible"}}>
                <defs>
                  <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={col} stopOpacity="0.25"/>
                    <stop offset="100%" stopColor={col} stopOpacity="0.02"/>
                  </linearGradient>
                </defs>
                {/* area fill */}
                <polygon points={areaPts} fill={`url(#${uid})`}/>
                {/* line */}
                <polyline points={linePts} fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                {/* current value dot */}
                <circle cx={last[0]} cy={last[1]} r="3" fill={col} stroke="var(--bg0)" strokeWidth="1.5"/>
                {/* min/max reference lines */}
                <line x1={pad} y1={pad} x2={W-pad} y2={pad} stroke="var(--bd1)" strokeWidth="0.5" strokeDasharray="2,3"/>
                <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke="var(--bd1)" strokeWidth="0.5" strokeDasharray="2,3"/>
                {/* min/max labels */}
                <text x={W-1} y={pad+3} fontSize="7" fill="var(--t2)" textAnchor="end">{max.toFixed(2)}</text>
                <text x={W-1} y={H-1} fontSize="7" fill="var(--t2)" textAnchor="end">{min.toFixed(2)}</text>
              </svg>
            );
          })()}
          <div style={{...SUB,fontSize:12,marginTop:4,opacity:.7}}>mCap {fB(mktCap)} · NAV {fB(btcNavTot)}</div>
        </div>
        <div style={CARD}>
          <div style={LBL}>ATM accretion ratio</div>
          <div style={{...VAL,color:accrRatio!=null?(accrRatio>=1.05?"#0F6E56":accrRatio>=1?"#854F0B":"#791F1F"):"var(--t0)"}}>{accrRatio!=null?`${f2(accrRatio)}×`:"—"}</div>
          <div style={SUB}>{accrRatio!=null&&(accrRatio>=1.05?"accretive":accrRatio>=1?"marginal":"dilutive")} {accrRatio!=null&&"to BTC/share"}</div>
          <div style={{...SUB,fontSize:10,marginTop:5,opacity:.7}}>{lastEvAccr!=null?`last ATM: ${f2(lastEvAccr)}× (vs live NAV)`:"—"}</div>
        </div>
        <div style={CARD}>
          <div style={LBL}>ATM regime</div>
          <div style={{marginBottom:6}}><span style={{...pill(rC[0],rC[2],rC[1]),fontSize:14,padding:"4px 10px"}}>{regime}</span></div>
          <div style={SUB}>{daysSince!=null?`last common: ${daysSince}d ago`:"no events"}</div>
          <div style={{...SUB,fontSize:10,marginTop:4,opacity:.7}}>{weeksActive>0?`${weeksActive}/4 weeks · ${fB(total4w)}`:"dormant"}</div>
        </div>
      </div>

      {/* ── OWNERSHIP FACTOR (always visible summary) ───────────────────────── */}
      <div style={{...CARD,marginBottom:8,border:`1px solid ${ownershipCtx.bg==="var(--bg1)"?"var(--bd1)":"var(--bd1)"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>setShowOwnership(v=>!v)}>
          <div style={{flex:1}}>
            <div style={{...LBL,marginBottom:6}}>BTC ownership factor (factor 4)</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              {/* Key ownership metrics — always visible */}
              <div style={{fontFamily:mono,fontSize:12}}>
                <span style={{color:"var(--t2)",fontSize:10}}>% max: </span>
                <span style={{color:"var(--t0)",fontWeight:500}}>{fPct(ownershipMetrics.pctMax,2)}</span>
              </div>
              <div style={{fontFamily:mono,fontSize:12}}>
                <span style={{color:"var(--t2)",fontSize:10}}>% eff. supply: </span>
                <span style={{color:"var(--t0)",fontWeight:500}}>{fPct(ownershipMetrics.pctEff,2)}</span>
              </div>
              <div style={{fontFamily:mono,fontSize:12}}>
                <span style={{color:"var(--t2)",fontSize:10}}>% exch. equiv: </span>
                <span style={{color:ownershipMetrics.pctExch>0.2?"#791F1F":"var(--t0)",fontWeight:500}}>{fPct(ownershipMetrics.pctExch,1)}</span>
              </div>
              {ownershipMetrics.delta30!=null&&(
                <div style={{fontFamily:mono,fontSize:12}}>
                  <span style={{color:"var(--t2)",fontSize:10}}>30D Δ: </span>
                  <span style={{color:ownershipMetrics.delta30>0?"#0F6E56":ownershipMetrics.delta30<0?"#791F1F":"var(--t0)",fontWeight:500}}>{ownershipMetrics.delta30>0?"+":""}{fK(Math.round(ownershipMetrics.delta30))} BTC</span>
                </div>
              )}
              {ownershipMetrics.accum30xIssuance!=null&&(
                <span style={pill(absorptionBg,absorptionColor,"transparent",true)}>
                  {fX(ownershipMetrics.accum30xIssuance)} monthly issuance
                </span>
              )}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:12}}>
            <span style={{...pill(ownershipCtx.bg,ownershipCtx.color,"transparent",true),whiteSpace:"nowrap"}}>{ownershipCtx.label}</span>
            <span style={{fontSize:12,fontFamily:mono,color:"var(--t2)"}}>{showOwnership?"▾":"▸"}</span>
          </div>
        </div>

        {/* Expanded detail */}
        {showOwnership&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--bd1)"}}>
            {/* Metrics grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
              {[
                {l:"% of max supply",v:fPct(ownershipMetrics.pctMax,2),note:"818k / 21M"},
                {l:"% of circulating",v:fPct(ownershipMetrics.pctCirc,2),note:`818k / ${fK(Math.round(circulatingBtc/1e6))}M`},
                {l:"% of eff. supply",v:fPct(ownershipMetrics.pctEff,2),note:`818k / ${fK(Math.round(effectiveBtc/1e6))}M est.`},
                {l:"% of exch. equiv",v:fPct(ownershipMetrics.pctExch,1),note:`818k / ${fK(Math.round(exchangeBtc/1e6))}M est.`},
              ].map(({l,v,note})=>(
                <div key={l} style={{background:"var(--bg0)",borderRadius:7,padding:"8px 10px",border:"1px solid var(--bd1)"}}>
                  <div style={{...LBL,fontSize:10,marginBottom:3}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:500,fontFamily:mono,color:"var(--t0)"}}>{v}</div>
                  <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",marginTop:2}}>{note}</div>
                </div>
              ))}
            </div>

            {/* Purchase / issuance */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{background:"var(--bg0)",borderRadius:7,padding:"8px 10px",border:"1px solid var(--bd1)"}}>
                <div style={{...LBL,fontSize:10,marginBottom:3}}>latest purchase vs daily issuance</div>
                <div style={{fontSize:18,fontWeight:500,fontFamily:mono,color:"var(--t0)"}}>{ownershipMetrics.latestPurchase?fK(Math.round(ownershipMetrics.latestPurchase))+" BTC":"—"}</div>
                <div style={{fontSize:11,fontFamily:mono,color:"var(--t1)",marginTop:2}}>= {ownershipMetrics.latestPurchaseXDaily?fX(ownershipMetrics.latestPurchaseXDaily):"—"} daily issuance ({btcDailyIssuance} BTC/day post-halving)</div>
              </div>
              <div style={{background:"var(--bg0)",borderRadius:7,padding:"8px 10px",border:"1px solid var(--bd1)"}}>
                <div style={{...LBL,fontSize:10,marginBottom:3}}>30D accumulation vs monthly issuance</div>
                <div style={{fontSize:16,fontWeight:500,fontFamily:mono,color:ownershipMetrics.delta30!=null?(ownershipMetrics.delta30>0?"#0F6E56":ownershipMetrics.delta30<0?"#791F1F":"var(--t0)"):"var(--t0)"}}>
                  {ownershipMetrics.delta30!=null?(ownershipMetrics.delta30>=0?"+":"")+fK(Math.round(ownershipMetrics.delta30))+" BTC":"insufficient history"}
                </div>
                <div style={{fontSize:11,fontFamily:mono,color:"var(--t1)",marginTop:2}}>
                  = {ownershipMetrics.accum30xIssuance!=null?fX(ownershipMetrics.accum30xIssuance):"—"} monthly issuance ({fK(ownershipMetrics.monthlyIssuance)} BTC/mo)
                  {ownershipMetrics.accum30xIssuance&&<span style={{marginLeft:6,...pill(absorptionBg,absorptionColor,"transparent",true)}}>{ownershipMetrics.absorptionLevel}</span>}
                </div>
              </div>
            </div>

            {/* Absorption threshold guide */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
              {[["< 1×","weak float impact","#E1F5EE","#085041"],["1–5×","meaningful","#FAEEDA","#633806"],["5–20×","high absorption","#FAECE7","#4A1B0C"],["> 20×","float squeeze risk","#FCEBEB","#791F1F"]].map(([v,d,bg,tx])=>(
                <div key={v} style={{background:bg,borderRadius:5,padding:"5px 8px"}}>
                  <div style={{fontSize:10,fontWeight:600,fontFamily:mono,color:tx}}>{v}</div>
                  <div style={{fontSize:9,fontFamily:mono,color:tx,opacity:.75,marginTop:1}}>{d}</div>
                </div>
              ))}
            </div>

            {/* Supply param inputs */}
            <div style={{borderTop:"1px solid var(--bd1)",paddingTop:10}}>
              <div style={{...LBL,marginBottom:8}}>supply parameters (update periodically from Glassnode / CoinGecko)</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                {[{l:"Circulating BTC",k:"circulatingBtc",note:"CoinGecko circulating"},{l:"Effective supply",k:"effectiveBtc",note:"excl. lost / illiquid est."},{l:"Exchange inventory",k:"exchangeBtc",note:"Glassnode on-chain"},{l:"Daily issuance",k:"btcDailyIssuance",note:"450 post-2024 halving"}].map(({l,k,note})=>(
                  <div key={k}>
                    <div style={{...LBL,fontSize:10}}>{l}</div>
                    <input style={{...INP,fontSize:11}} type="number" value={settings[k]} onChange={e=>setSettings({[k]:Number(e.target.value)})}/>
                    <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",marginTop:2}}>{note}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── Market Absorption + BTC/Share Trend row ──────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

        {/* Absorption ratio */}
        <div style={{...CARD,borderLeft:`3px solid ${absorptionCtx.color}`}}>
          <div style={LBL}>market absorption ratio</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
            <div style={{fontSize:22,fontWeight:500,fontFamily:mono,color:absorptionCtx.color}}>
              {absorptionCtx.ratio!=null?`${(absorptionCtx.ratio*100).toFixed(1)}%`:"—"}
            </div>
            <span style={pill(absorptionCtx.bg,absorptionCtx.color,"transparent",true)}>{absorptionCtx.label}</span>
          </div>
          <div style={{fontSize:12,fontFamily:mono,color:"var(--t2)",lineHeight:1.6}}>
            {absorptionCtx.ratio!=null
              ?`~${fK(Math.round(absorptionCtx.dailyAtm))} sh/day ATM vs ${mstrVol?fK(Math.round(mstrVol/1e6))+"M avg vol":"no vol data"}`
              :mstrVol?"no ATM in last 30 days":"waiting for volume data"}
          </div>
          <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",marginTop:4,opacity:.7}}>
            &lt;3% low · 3–8% moderate · 8–15% high · &gt;15% critical
          </div>
        </div>

        {/* BTC/share trend */}
        <div style={{...CARD,borderLeft:`3px solid ${btcPerShareTrend.trend==="rising"?"#1D9E75":btcPerShareTrend.trend==="falling"?"#E24B4A":"#888"}`}}>
          <div style={LBL}>BTC / share trend (30D)</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
            <div style={{fontSize:22,fontWeight:500,fontFamily:mono,color:btcPerShareTrend.trend==="rising"?"#0F6E56":btcPerShareTrend.trend==="falling"?"#791F1F":"var(--t1)"}}>
              {btcPerShareTrend.trend==="rising"?"↑ Rising":btcPerShareTrend.trend==="falling"?"↓ Falling":btcPerShareTrend.trend==="flat"?"→ Flat":"— No history"}
            </div>
          </div>
          <div style={{fontSize:12,fontFamily:mono,color:"var(--t2)",lineHeight:1.6}}>
            {btcPerShareTrend.pct30!=null
              ?`${btcPerShareTrend.pct30>=0?"+":""}${(btcPerShareTrend.pct30*100).toFixed(3)}% over 30D · current ${f5(btcPerSh)} BTC/sh`
              :"update BTC held to start tracking"}
          </div>
          {annualPreferredCost>0&&(
            <div style={{fontSize:9,fontFamily:mono,color:"#854F0B",marginTop:4}}>
              ⚠ preferred cost {fB(annualPreferredCost)}/yr — reduces common NAV accretion
            </div>
          )}
        </div>
      </div>

      {/* ── STRC Preferred Flywheel Panel ────────────────────────────────────── */}
      {(()=>{
        const PAR_C={
          stable:  {bg:"#E1F5EE",tx:"#085041",border:"#1D9E75",label:"stable"},
          watch:   {bg:"#EEF5FF",tx:"#1a4d8f",border:"#378ADD",label:"watch"},
          warning: {bg:"#FAEEDA",tx:"#633806",border:"#EF9F27",label:"warning ⚠"},
          critical:{bg:"#FCEBEB",tx:"#791F1F",border:"#E24B4A",label:"critical ✗"},
          unknown: {bg:"var(--bg1)",tx:"var(--t2)",border:"var(--bd1)",label:"no data"},
        };
        const COV_C={
          strong:  {c:"#0F6E56",label:"strong"},
          adequate:{c:"#854F0B",label:"adequate"},
          warning: {c:"#993C1D",label:"warning"},
          critical:{c:"#791F1F",label:"critical"},
          unknown: {c:"var(--t2)",label:"—"},
        };
        const pc=PAR_C[strcMetrics.parStatus]||PAR_C.unknown;
        const cc=COV_C[strcMetrics.coverageStatus]||COV_C.unknown;
        const sdot=({live:"#1D9E75",proxy:"#1D9E75",proxy2:"#1D9E75",manual:"#378ADD",cached:"#888",fetching:"#EF9F27",pending:"#aaa","no data — set manual":"#E24B4A"}[strcStatus])||"#aaa";
        return(
          <div style={{...CARD,marginBottom:8,borderLeft:`3px solid ${pc.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{...LBL,marginBottom:0}}>STRC preferred flywheel</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,fontFamily:mono,color:"var(--t2)",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:sdot,display:"inline-block"}}/>
                  {effStrc?`$${f2(effStrc)}`:"—"}
                </span>
                <span style={{...pill(pc.bg,pc.tx,pc.border,true)}}>{pc.label}</span>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

              {/* Tile 1: Par discount/premium */}
              <div style={{background:"var(--bg0)",borderRadius:7,padding:"8px 10px",border:"1px solid var(--bd1)"}}>
                <div style={LBL}>vs $100 par</div>
                <div style={{fontSize:20,fontWeight:600,fontFamily:mono,
                  color:strcMetrics.discount==null?"var(--t2)":strcMetrics.discount<-0.03?"#791F1F":strcMetrics.discount<-0.01?"#854F0B":"#0F6E56"}}>
                  {strcMetrics.discount!=null
                    ?`${strcMetrics.discount>=0?"+":""}${(strcMetrics.discount*100).toFixed(2)}%`:"—"}
                </div>
                <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",marginTop:3,lineHeight:1.5}}>
                  52w low: $88 · high: $100.42<br/>
                  {strcMetrics.parStatus==="critical"?"⚠ flywheel impaired":
                   strcMetrics.parStatus==="warning"?"ATM capacity reduced":
                   strcMetrics.parStatus==="watch"?"monitor closely":
                   strcMetrics.parStatus==="stable"?"ATM capacity intact":"set STRC price in ⚙"}
                </div>
              </div>

              {/* Tile 2: Dividend coverage ratio */}
              <div style={{background:"var(--bg0)",borderRadius:7,padding:"8px 10px",border:"1px solid var(--bd1)"}}>
                <div style={LBL}>dividend coverage</div>
                <div style={{fontSize:20,fontWeight:600,fontFamily:mono,color:cc.c}}>
                  {strcMetrics.coverageRatio!=null?`${strcMetrics.coverageRatio.toFixed(1)}×`:"—"}
                </div>
                <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",marginTop:3,lineHeight:1.5}}>
                  {fB(strcMetrics.annualDividend)}/yr cost<br/>
                  {fB(strcMetrics.totalFunding)}/yr funding ({cc.label})
                </div>
              </div>

              {/* Tile 3: Flywheel stress indicator */}
              <div style={{background:strcMetrics.flywheelStress?"#FAEEDA":"var(--bg0)",
                borderRadius:7,padding:"8px 10px",border:`1px solid ${strcMetrics.flywheelStress?"#EF9F27":"var(--bd1)"}`}}>
                <div style={LBL}>flywheel stress</div>
                <div style={{fontSize:16,fontWeight:600,fontFamily:mono,
                  color:strcMetrics.flywheelStress?"#854F0B":"#0F6E56",marginBottom:4}}>
                  {strcMetrics.flywheelStress?"⚠ Detected":"✓ None"}
                </div>
                <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)",lineHeight:1.5}}>
                  {strcMetrics.flywheelStress
                    ?"STRC discount forming — capital rotating preferred over common"
                    :"STRC stable at par · preferred issuance capacity intact"}
                </div>
              </div>
            </div>

            {/* STRC price override input */}
            <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:11,fontFamily:mono,color:"var(--t2)"}}>STRC override:</div>
              <input style={{...INP,width:120,fontSize:11}} type="number" step="0.01"
                placeholder="blank = live fetch" value={strcManualPrice||""}
                onChange={e=>setSettings({strcManualPrice:Number(e.target.value)})}/>

// Error boundary — prevents any single error from white-screening the whole app
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,msg:""};}
  static getDerivedStateFromError(error){return{hasError:true,msg:error?.message||"Unknown error"};}
  componentDidCatch(error,info){console.error("Dashboard error:",error,info);}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:"24px",fontFamily:"monospace",maxWidth:600,margin:"40px auto",lineHeight:1.6}},
        React.createElement("h2",{style:{fontSize:18,marginBottom:12}},"⚠ Something went wrong"),
        React.createElement("p",{style:{fontSize:13,color:"#666",marginBottom:12}},"The dashboard hit an error while loading. This is often a temporary data-fetch issue."),
        React.createElement("p",{style:{fontSize:12,color:"#999",marginBottom:16,fontFamily:"monospace"}},"Error: "+this.state.msg),
        React.createElement("button",{onClick:()=>{try{localStorage.clear();}catch(e){}location.reload();},style:{padding:"8px 16px",fontSize:13,cursor:"pointer",borderRadius:6,border:"1px solid #ccc",background:"#f5f5f5",marginRight:8}},"Reset & reload"),
        React.createElement("button",{onClick:()=>location.reload(),style:{padding:"8px 16px",fontSize:13,cursor:"pointer",borderRadius:6,border:"1px solid #ccc",background:"#fff"}},"Just reload")
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary,null,React.createElement(App,null))
);
</script>
